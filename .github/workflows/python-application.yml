name: Python Application CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar pruebas
        run: |
          pytest

      - name: Ejecutar aplicacion
        run: |
          python app.py

      - name: Simular despliegue
        run: |
          echo "Despliegue realizado correctamente"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir imagen Docker
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ejercicio:3.0.0 .

      - name: Publicar imagen
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/ejercicio:3.0.0